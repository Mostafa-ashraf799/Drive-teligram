<script>
// ============================================================
//  تعديل وظيفة المشاركة لحماية الـ Token
// ============================================================
function shareFile(id) {
  const f = files.find(x => x.id == id);
  if (!f) return;
  _shareFileId = id;

  // المحفظة الآن لا تحتوي على الـ Token الخاص بك
  const shareData = {
    n: f.name,
    s: f.size,
    fid: f.fileId,
    t: f.type,
    cid: f.chatId,
    mid: f.id
    // تم حذف السطر: token: BOT_TOKEN لضمان الأمان
  };
  
  const encoded = btoa(unescape(encodeURIComponent(JSON.stringify(shareData))));
  const pageUrl = window.location.href.split('?')[0].split('#')[0];
  const encryptedLink = `${pageUrl}#share=${encoded}`;

  document.getElementById('share-url-text').textContent = encryptedLink;

  const tgLink = `https://t.me/c/${String(f.chatId).replace('-100','')}/${f.id}`;
  document.getElementById('share-tg-text').textContent = tgLink;

  switchShareTab('url');
  document.getElementById('share-modal').classList.add('show');
}

// ============================================================
//  تعديل عرض الملف المشترك ليطلب Token المستلم إذا لزم الأمر
// ============================================================
function showSharedFileViewer(data) {
  const overlay = document.createElement('div');
  overlay.id = "shared-viewer-overlay";
  overlay.style.cssText = `position:fixed;inset:0;background:rgba(0,0,0,0.95);backdrop-filter:blur(10px);z-index:9000;display:flex;align-items:center;justify-content:center;`;
  
  // إذا كان المستلم غير مسجل دخول، سنطلب منه Token ليتمكن من التحميل من سيرفرات تيليجرام
  const currentToken = sessionStorage.getItem('tg_token') || '';
  
  overlay.innerHTML = `
    <div style="background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:36px;max-width:440px;width:90%;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,0.5);">
      <div style="font-size:52px;margin-bottom:16px">${data.t === 'image' ? '🖼️' : data.t === 'video' ? '🎬' : '📄'}</div>
      <div style="font-size:18px;font-weight:800;margin-bottom:8px">${data.n}</div>
      <div style="font-size:13px;color:var(--text-muted);margin-bottom:24px">${formatSize(data.s)}</div>
      
      ${!currentToken ? `
        <input type="text" id="visitor-token" placeholder="أدخل Bot Token للتحميل..." 
          style="width:100%; padding:10px; margin-bottom:15px; background:var(--surface2); border:1px solid var(--border); color:white; border-radius:8px; text-align:center;">
      ` : ''}

      <button id="shared-download-btn"
        style="background:linear-gradient(135deg,#2AABEE,#229ED9);border:none;border-radius:12px;padding:14px 28px;color:white;font-family:'Tajawal',sans-serif;font-size:15px;font-weight:700;cursor:pointer;width:100%;margin-bottom:10px;">
        ⬇️ تحميل الملف
      </button>
      
      <button onclick="document.getElementById('shared-viewer-overlay').remove();history.pushState('','',window.location.pathname)"
        style="background:var(--surface2);border:1px solid var(--border);border-radius:12px;padding:12px;color:var(--text-dim);font-family:'Tajawal',sans-serif;font-size:14px;cursor:pointer;width:100%">
        إغلاق
      </button>
      <div style="margin-top:16px;font-size:11px;color:var(--success)">🔒 تم إزالة بيانات الأمان الخاصة بالمرسل.</div>
    </div>
  `;
  document.body.appendChild(overlay);

  document.getElementById('shared-download-btn').onclick = () => {
    const tokenToUse = currentToken || document.getElementById('visitor-token').value;
    if(!tokenToUse) return showToast('⚠️ يرجى إدخال Bot Token للتحميل', 'error');
    downloadSharedFile(data, tokenToUse);
  };
}

async function downloadSharedFile(data, token) {
  showToast('⬇️ جاري التحقق من الملف...', 'info');
  try {
    const res = await fetch(`https://api.telegram.org/bot${token}/getFile?file_id=${data.fid}`);
    const result = await res.json();
    if (result.ok) {
      const url = `https://api.telegram.org/file/bot${token}/${result.result.file_path}`;
      const a = document.createElement('a');
      a.href = url; a.download = data.n; a.target = '_blank';
      document.body.appendChild(a); a.click(); document.body.removeChild(a);
      showToast('✅ بدأ التحميل', 'success');
    } else {
      showToast('❌ الـ Token غير صحيح أو لا يملك صلاحية الوصول للملف', 'error');
    }
  } catch(e) {
    showToast('❌ خطأ في الاتصال', 'error');
  }
}
</script>
